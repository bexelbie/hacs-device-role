name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    uses: ./.github/workflows/unit-tests.yml

  validate-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate manifest.json version matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          MANIFEST_VERSION=$(python3 -c "import json; print(json.load(open('custom_components/device_role/manifest.json'))['version'])")
          echo "Tag version:      $TAG_VERSION"
          echo "Manifest version: $MANIFEST_VERSION"
          if [ "$TAG_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "::error::manifest.json version ($MANIFEST_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

  release:
    needs: [test, validate-version]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        run: |
          if echo "$GITHUB_REF_NAME" | grep -q '-'; then
            gh release create "$GITHUB_REF_NAME" --notes-from-tag --prerelease
          else
            gh release create "$GITHUB_REF_NAME" --notes-from-tag
          fi
        env:
          GH_TOKEN: ${{ github.token }}
